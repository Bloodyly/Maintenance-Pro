[global]
   workgroup = WORKGROUP
   server string = Maintenance Samba Server
   security = user
   map to guest = Bad User
   log file = /var/log/samba/%m.log
   max log size = 50
   dns proxy = no
   create mask = 0775
   directory mask = 0775

[archival]
   comment = Instandhaltungs-Netzlaufwerk (Mandanten-Archivpfade)
   path = /samba_shares
   writable = yes
   guest ok = yes
   read only = no
   force user = root
