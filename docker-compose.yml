version: "3.8"

services:
  # 1. WebUI Service - Private internal management interface
  webui:
    build: ./server_stack/webui
    container_name: maintenance_webui
    restart: unless-stopped
    environment:
      - PORT=8080
      - DB_PATH=/shared_db/protocols.db
      - SAMBA_SHARE_PATH=/samba_shares
      # Needed to build the SECURE_MANDANT;... QR setup code for technicians --
      # SERVER_CODEWORD must match netlink's value below (same shared transport
      # secret); PUBLIC_SERVER_ADDRESS/PORT is what a technician's phone actually
      # connects to (netlink's WAN-facing address), not this WebUI's own LAN address.
      - SERVER_CODEWORD=77-XJ-900-PLX-22 # Symmetrischer AES Key, muss mit netlink übereinstimmen
      - PUBLIC_SERVER_ADDRESS=http://192.168.20.7
      - PUBLIC_SERVER_PORT=3360
    volumes:
      - db_data:/shared_db:rw  # Database accesses via RO (read-only) or RW depending on needs
      # --- SAMBA SHARES CONFIGURATION ---
      # OPTION A: Use the shared docker volume (local or mapped to external NAS/Samba, see bottom 'volumes' section)
      - samba_data:/samba_shares:rw
      # OPTION B: Direct Host Binding (Uncomment below and comment out 'samba_data' above to map a local folder or pre-mounted NAS folder)
      # - /mnt/nas/wartungsprojekt:/samba_shares:rw
    networks:
      - internal_lan
    ports:
      - "8080:8080" # Exposed only to the internal corporate LAN

  # 2. Netlink Service - Public-facing API handler with Android Clients
  netlink:
    build: ./server_stack/netlink
    container_name: maintenance_netlink
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_PATH=/shared_db/protocols.db
      - SERVER_CODEWORD=77-XJ-900-PLX-22 # Symmetrischem AES Key
      - APP_UPDATES_PATH=/samba_shares/AppUpdates
    volumes:
      - db_data:/shared_db:rw  # SHARED DIRECTORY WITH THE DB (ProtocolDB Volume)
      # Read-only: netlink only serves the latest APK release the webui uploads,
      # never writes here. Fixed to the local samba_data volume regardless of the
      # webui/protocol_core "Archiv-Ziel" setting -- see the /app/update-info comment.
      - samba_data:/samba_shares:ro
    networks:
      - internet_wan # Only has internet access, no internal_lan connection
    ports:
      - "3360:3000" # Exposes on host port 3360 to bypass the 3000 conflict (Grafana)

  # 3. ProtocolDB Service - Internal database explorer and schema validator
  # Uses the shared SQLite workspace volume, keeping it separated from the WAN netlink network
  protocol_db:
    image: alpine:latest
    container_name: maintenance_protocol_db
    restart: unless-stopped
    volumes:
      - db_data:/shared_db:rw
    command: /bin/sh -c "echo 'Database service running. Holding shared DB directory...' && tail -f /dev/null"
    networks:
      - internal_lan # Accessible only internally, no WAN connection

  # 4. ProtocolCore - Automated processing, evaluation, interpretation & backup worker
  protocol_core:
    build: ./server_stack/protocol_core
    container_name: maintenance_protocol_core
    restart: unless-stopped
    environment:
      - DB_PATH=/shared_db/protocols.db
      - SAMBA_SHARE_PATH=/samba_shares
    volumes:
      - db_data:/shared_db:rw
      # --- SAMBA SHARES CONFIGURATION ---
      # OPTION A: Use the shared docker volume
      - samba_data:/samba_shares:rw
      # OPTION B: Direct Host Binding (Matches Option B in webui)
      # - /mnt/nas/wartungsprojekt:/samba_shares:rw
    networks:
      - internal_lan

  # 5. Samba Service - Exposes network shared folders
  # ⚠️ OPTIONAL COMPONENT: If you have an existing NAS (like Synology, QNAP, TrueNAS),
  # you can comment this entire service block out, make your NAS share accessible to
  # the Docker host, and configure OPTION B (above) or the system volume driver (below).
  samba:
    build: ./server_stack/samba
    container_name: maintenance_samba
    restart: unless-stopped
    ports:
      - "139:139"
      - "445:445"
    volumes:
      - samba_data:/samba_shares:rw
    networks:
      - internal_lan

networks:
  # Internal LAN Network: Standard bridge so Docker and Portainer can map host ports
  internal_lan:
    driver: bridge
  # WAN Internet Network: Allows external access, connecting Netlink with Android apps
  internet_wan:
    driver: bridge

volumes:
  # Shared sqlite/db storage directory (Strictly bridges Netlink & ProtocolDB)
  db_data:

  # Shared Samba folders volume
  # Configure this volume based on whether you want an internal Samba helper container OR a physical NAS.
  samba_data:
    # --- VOLUMES CONFIGURATION OPTION 1: Standalone Docker volume ---
    # (Default: Docker handles local cache. Used directly when the 'samba' service is running)
    
    # --- VOLUMES CONFIGURATION OPTION 2: Mount External NAS directly via CIFS driver ---
    # Uncomment lines below and adjust values if you wish to connect directly to your external Samba/NAS.
    # If using this, you should completely delete or comment out the 'samba' service above!
    #
    # driver: local
    # driver_opts:
    #   type: "cifs"
    #   device: "//192.168.1.100/my-wartung-share" # Replace with your NAS IP/Share Path
    #   o: "username=nas_username,password=nas_password,vers=3.0,rw,uid=1000,gid=1000"

